<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LexReview — Revisão Espaçada de Direito</title>
  <meta name="description" content="Aplicativo de revisão espaçada para estudo de Direito Brasileiro. Flashcards com algoritmo SM-2.">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%231a365d'/%3E%3Cpath d='M8 24V8l8 4.5L24 8v16l-8-4.5z' fill='none' stroke='%23fff' stroke-width='2' stroke-linejoin='round'/%3E%3Ccircle cx='16' cy='16' r='3' fill='none' stroke='%23c9953c' stroke-width='1.5'/%3E%3C/svg%3E">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-layout">
    <!-- Mobile Header -->
    <div class="mobile-header">
      <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="Menu">
        <i data-lucide="menu"></i>
      </button>
      <div class="mobile-logo">
        <svg width="24" height="24" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="40" height="40" rx="8" fill="var(--color-primary)"/>
          <path d="M10 30V10l10 5.625L30 10v20l-10-5.625z" stroke="var(--color-text-inverse)" stroke-width="2.5" stroke-linejoin="round" fill="none"/>
          <circle cx="20" cy="20" r="3.5" stroke="var(--color-accent)" stroke-width="1.5" fill="none"/>
        </svg>
        <span class="mobile-logo-title">LexReview</span>
      </div>
      <button class="theme-toggle" onclick="App.toggleTheme()" style="margin-left: auto; width: auto; padding: 6px;" aria-label="Alternar tema">
        <i data-lucide="moon" style="width:18px;height:18px"></i>
      </button>
    </div>
    <div class="mobile-overlay" id="mobile-overlay"></div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <!-- Custom SVG Logo: stylized law book with scale/balance motif -->
          <svg width="36" height="36" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="LexReview Logo">
            <rect width="40" height="40" rx="8" fill="var(--color-primary)"/>
            <!-- Book shape -->
            <path d="M10 30V10l10 5.625L30 10v20l-10-5.625z" stroke="var(--color-text-inverse)" stroke-width="2.5" stroke-linejoin="round" fill="none"/>
            <!-- Center circle (brain/scale abstraction) -->
            <circle cx="20" cy="20" r="3.5" stroke="var(--color-accent)" stroke-width="1.5" fill="none"/>
            <!-- Scale bars -->
            <line x1="17" y1="20" x2="23" y2="20" stroke="var(--color-accent)" stroke-width="1.2"/>
            <line x1="20" y1="17" x2="20" y2="23" stroke="var(--color-accent)" stroke-width="1.2"/>
          </svg>
          <div class="sidebar-logo-text">
            <span class="sidebar-logo-title">LexReview</span>
            <span class="sidebar-logo-subtitle">Revisão Espaçada</span>
          </div>
        </div>
      </div>

      <nav class="nav-menu">
        <button class="nav-link active" data-route="dashboard">
          <i data-lucide="layout-dashboard"></i>
          Painel
        </button>
        <button class="nav-link" data-route="review">
          <i data-lucide="play-circle"></i>
          Revisar
          <span class="nav-badge" id="nav-review-badge" style="display:none">0</span>
        </button>
        <button class="nav-link" data-route="add">
          <i data-lucide="plus-circle"></i>
          Adicionar
        </button>
        <button class="nav-link" data-route="browse">
          <i data-lucide="library"></i>
          Navegador
        </button>
        <button class="nav-link" data-route="stats">
          <i data-lucide="bar-chart-3"></i>
          Estatísticas
        </button>
        <button class="nav-link" data-route="settings">
          <i data-lucide="settings"></i>
          Configurações
        </button>
      </nav>

      <div class="sidebar-footer">
        <button class="theme-toggle" id="theme-toggle-btn" onclick="App.toggleTheme()">
          <i data-lucide="moon"></i>
          Modo Escuro
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <div id="main-content"></div>
    </main>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Scripts -->
  <script src="js/storage.js"></script>
  <script src="js/sm2.js"></script>
  <script src="js/router.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
